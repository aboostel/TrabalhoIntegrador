<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Git</title>

  <style>
    body{
      background: #111;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box{
      background: #1e1e1e;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1{
      color: #00ff88;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>FUNCIONOU 🚀</h1>
    <p>O Git está enviando alterações pro repositório.</p>

    <button onclick="teste()">
      Clique aqui
    </button>
  </div>

  <script>
    function teste(){
      alert("JavaScript funcionando!");
    }
  </script>

</body>
</html>
